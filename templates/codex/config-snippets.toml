# Example only. Adapt to your Codex installation and keep private project paths
# out of shared public config.

[features]
hooks = true

# Serena MCP server shape for a project-scoped Codex session.
# Prefer launching Codex from the target repo when using --project-from-cwd.
[mcp_servers.serena]
command = "serena"
args = ["start-mcp-server", "--context=codex", "--project-from-cwd"]
startup_timeout_sec = 30

# Readiness rule:
# MCP connection proves transport only. Activate the exact project and run a
# real source-symbol smoke before relying on Serena definitions/references.
