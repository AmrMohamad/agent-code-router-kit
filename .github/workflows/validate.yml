name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install benchmark tools
        run: |
          brew list ripgrep >/dev/null 2>&1 || brew install ripgrep
          brew list fd >/dev/null 2>&1 || brew install fd
          brew list ast-grep >/dev/null 2>&1 || brew install ast-grep
          command -v rg
          command -v fd
          command -v ast-grep
      - name: Python syntax
        run: |
          find scripts -type f -name '*.py' -print0 | xargs -0 python3 -m py_compile
      - name: Unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
      - name: Shell syntax
        run: |
          bash -n scripts/setup/check-swift-ios-prereqs.sh
          bash -n scripts/setup/check-android-prereqs.sh
          bash -n scripts/setup/create-build-server-json.sh
          bash -n scripts/setup/create-android-serena-project.sh
          bash -n scripts/setup/repair-serena-android-sessions.sh
          bash -n scripts/setup/agent-self-install.sh
      - name: Benchmark fixture smoke
        run: |
          pwd
          find benchmarks/ios/fixtures/sample -type f | sort
          find benchmarks/web/fixtures/sample -type f | sort
          rg --version
          rg --no-config --no-ignore -n --glob '*.swift' 'ExampleRouter' benchmarks/ios/fixtures/sample
          rg --no-config --no-ignore -n --glob '*.{ts,tsx}' 'FrontendRouter' benchmarks/web/fixtures/sample
      - name: Benchmark manifest validation
        run: |
          python3 scripts/benchmarks/shared/benchmark_runner.py --help
          python3 scripts/benchmarks/shared/benchmark_runner.py --validate \
            --cases benchmarks/ios/cases.example.tsv
          python3 scripts/benchmarks/shared/benchmark_runner.py --validate \
            --cases benchmarks/android/cases.sample.tsv
          python3 scripts/benchmarks/shared/benchmark_runner.py --run \
            --cases benchmarks/ios/cases.example.tsv \
            --repo sample=benchmarks/ios/fixtures/sample \
            --output /tmp/agent-code-router-kit-benchmark \
            --repeats 1 \
            --warmups 0 \
            --timeout 10 \
            --enforce-assertions
      - name: Real-agent benchmark dry-run
        run: |
          export RARB_PRIVATE_HMAC_KEY=ci-router-effect-fixture-key
          python3 scripts/benchmarks/run_real_agent_benchmark.py \
            --dry-run \
            --agent codex \
            --repo "$PWD" \
            --repo-map ios_reference="$PWD/benchmarks/ios/fixtures/sample",web_reference="$PWD/benchmarks/web/fixtures/sample" \
            --study-plan benchmarks/real-agent-routing/studies/router-effect-v1/study.yaml \
            --tasks benchmarks/real-agent-routing/studies/router-effect-v1/pilot-tasks.tsv \
            --task-oracles benchmarks/real-agent-routing/studies/router-effect-v1/task-oracles.json \
            --arms A-search-only,B-search-summary,C-lsp-naive,D-full-router \
            --task-limit 3 \
            --repeats 4 \
            --snapshot-repos \
            --model-id ci-dry-run-model \
            --reasoning-effort low \
            --clean-out \
            --out /tmp/agent-code-router-kit-rarb
      - name: Symlink check
        run: |
          test -z "$(find . -type l -maxdepth 5 -print)"
      - name: Public safety scan
        run: python3 scripts/benchmarks/shared/check_public_sanitization.py
